<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureRide Insurance Advisor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <div class="logo-box">
    <img src="assets/images/logo.png">
    <span>SecureRide</span>
  </div>
  <a href="https://wa.me/917633801161" class="whatsapp-btn">WhatsApp Now</a>
</header>

<section class="hero">

  <!-- SLIDER -->
  <div class="slider">
    <img src="assets/images/slider1.jpg" class="slide active">
    <img src="assets/images/slider2.jpg" class="slide">
    <img src="assets/images/slider3.jpg" class="slide">
  </div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- FORM -->
  <div class="quote-box">
    <h1>Get Best Vehicle Insurance</h1>
    <p>Compare • Save • Instant WhatsApp Support</p>

    <form onsubmit="sendToWhatsApp(event)">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="text" id="vehicle" placeholder="Vehicle Number" required />
      <input type="tel" id="mobile" placeholder="Mobile Number" required />
      <button type="submit">Get Best Quote</button>
    </form>

    <small>⚡ Instant response within 5 minutes</small>
  </div>

</section>

<footer class="footer">
  © 2026 SecureRide Insurance Advisor
</footer>

<a href="https://wa.me/917633801161" class="floating-wa">💬</a>

<script src="script.js"></script>
</body>
</html>
